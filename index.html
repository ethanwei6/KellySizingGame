<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Probability Betting</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <p class="eyebrow">Kelly sizing practice</p>
            <h1>Probability Betting</h1>
          </div>
        </div>

        <div class="status-strip" aria-live="polite">
          <div>
            <span class="status-label">Bankroll</span>
            <strong id="bankrollValue">$1,000</strong>
          </div>
          <div>
            <span class="status-label">Round</span>
            <strong id="roundValue">1 / 6</strong>
          </div>
          <div>
            <span class="status-label">Score</span>
            <strong id="skillValue">0.0</strong>
          </div>
          <div>
            <span class="status-label">Clock</span>
            <strong id="clockValue">Practice</strong>
          </div>
        </div>
      </header>

      <main class="table-surface" aria-labelledby="tableTitle">
        <div class="surface-head">
          <div>
            <p class="eyebrow" id="phaseLabel">Betting phase</p>
            <h2 id="tableTitle">Choose which posted payouts are worth betting</h2>
          </div>
          <div class="round-controls">
            <button class="secondary-button" id="resetButton" type="button">Reset</button>
            <button class="primary-button" id="submitButton" type="button">Submit bets</button>
          </div>
        </div>

        <section class="control-band" aria-label="Session controls">
          <div class="control-row">
            <label for="roundCount">Rounds</label>
            <select id="roundCount">
              <option value="5">5 rounds</option>
              <option value="6" selected>6 rounds</option>
              <option value="8">8 rounds</option>
              <option value="10">10 rounds</option>
            </select>
          </div>
          <div class="control-row">
            <label for="bankrollStart">Starting bankroll</label>
            <select id="bankrollStart">
              <option value="500">$500</option>
              <option value="1000" selected>$1,000</option>
              <option value="2500">$2,500</option>
            </select>
          </div>
          <label class="toggle-row">
            <input id="timedToggle" type="checkbox" />
            <span>Timed rounds</span>
          </label>
          <button class="secondary-button" id="startButton" type="button">Start new game</button>
        </section>

        <section class="round-summary" id="roundSummary" aria-label="Round summary">
          <div>
            <span>Total staked</span>
            <strong id="totalStaked">$0</strong>
          </div>
          <div>
            <span>Available</span>
            <strong id="availableBankroll">$1,000</strong>
          </div>
          <div>
            <span id="correctLabel">Correct entries</span>
            <strong id="edgeCount">Hidden</strong>
          </div>
        </section>

        <div class="message-line" id="messageLine" role="status"></div>

        <section class="instrument-board" id="marketGrid" aria-label="Betting markets"></section>

        <section class="score-panel" aria-label="Score breakdown">
          <div class="score-card">
            <div class="bar-label">
              <span>Correct markets</span>
              <strong id="decisionScore">0 / 60</strong>
            </div>
            <div class="meter"><span id="decisionMeter"></span></div>
          </div>
          <div class="score-card">
            <div class="bar-label">
              <span>Kelly sizing</span>
              <strong id="sizingScore">0 / 40</strong>
            </div>
            <div class="meter"><span id="sizingMeter"></span></div>
          </div>
        </section>
      </main>

      <section class="review-drawer" id="reviewDrawer" aria-labelledby="reviewTitle">
        <div class="review-heading">
          <div>
            <p class="eyebrow">Review phase</p>
            <h2 id="reviewTitle">Round analysis</h2>
          </div>
          <button class="secondary-button" id="clearReviewButton" type="button">Hide review</button>
        </div>
        <div id="reviewContent" class="review-content"></div>
      </section>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
